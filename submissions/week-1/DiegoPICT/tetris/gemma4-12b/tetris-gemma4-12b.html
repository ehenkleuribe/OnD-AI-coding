<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #1a1a2e;
            --text-color: #e0e0e0;
            --accent-color: #00f2ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            background: var(--panel-color);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        canvas {
            border: 2px solid #333;
            background-color: #000;
            box-shadow: inset 0 0 10px #000;
        }

        .stats-side {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 150px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
            text-align: center;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 2px solid red;
            text-align: center;
            display: none;
            z-index: 10;
        }

        button {
            background: var(--accent-color);
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Neon Tetris</h1>

    <div class="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="stats-side">
            <div>
                <div class="stat-box">
                    <div style="font-size: 0.8rem;">SCORE</div>
                    <div id="score" style="font-size: 1.5rem; font-weight: bold;">0</div>
                </div>
                <br>
                <div class="stat-box">
                    <div style="font-size: 0.8rem;">LINES</div>
                    <div id="lines" style="font-size: 1.5rem; font-weight: bold;">0</div>
                </div>
            </div>
            <div style="font-size: 0.7rem; color: #666;">
                WASD / Arrows to Move<br>
                Up / Q / W to Rotate<br>
                Space to Drop
            </div>
        </div>
    </div>

    <div id="game-over">
        <h2 style="color: #ff4d4d;">GAME OVER</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="resetGame()">TRY AGAIN</button>
    </div>

    <div class="controls-hint">Use Arrow Keys or WASD to play</div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const linesElement = document.getElementById('lines');

    context.scale(20, 20);

    // Piece shapes
    function createPiece(type) {
        if (type === 'I') {
            return [
                [0, 1, 0, 0],
                [0, 1, 0, 0],
                [0, 1, 0, 0],
                [0, 1, 0, 0],
            ];
        } else if (type === 'L') {
            return [
                [0, 2, 0],
                [0, 2, 0],
                [0, 2, 2],
            ];
        } else if (type === 'J') {
            return [
                [0, 3, 0],
                [0, 3, 0],
                [3, 3, 0],
            ];
        } else if (type === 'O') {
            return [
                [4, 4],
                [4, 4],
            ];
        } else if (type === 'Z') {
            return [
                [5, 5, 0],
                [0, 5, 5],
                [0, 0, 0],
            ];
        } else if (type === 'S') {
            return [
                [0, 6, 6],
                [6, 6, 0],
                [0, 0, 0],
            ];
        } else if (type === 'T') {
            return [
                [0, 7, 0],
                [7, 7, 7],
                [0, 0, 0],
            ];
        }
    }

    // Colors for the pieces
    const colors = [
        null,
        '#00f2ff', // I - Cyan
        '#ff9d00', // L - Orange
        '#3d5afe', // J - Blue
        '#ffff00', // O - Yellow
        '#ff0066', // Z - Pink/Red
        '#00ff66', // S - Green
        '#9c27b0', // T - Purple
    ];

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    function draw() {
        // Fill background
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);

        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    // Block body
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    
                    // Block border/glow
                    context.strokeStyle = 'rgba(255,255,255,0.5)';
                    context.lineWidth = 0.05;
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [
                    matrix[x][y],
                    matrix[y][x],
                ] = [
                    matrix[y][x],
                    matrix[x][y],
                ];
            }
        }
        if (dir > 0) {
            matrix.forEach(row => row.reverse());
        } else {
            matrix.reverse();
        }
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
        }
    }

    function playerReset() {
        const pieces = 'TJLOSIZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) -
                        (player.matrix[0].length / 2 | 0);
        
        if (collide(arena, player)) {
            // Game Over
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            gameOver = true;
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) {
                    continue outer;
                }
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;

            score += rowCount * 10;
            lines += 1;
            rowCount *= 2;
        }
    }

    function updateScore() {
        scoreElement.innerText = score;
        linesElement.innerText = lines;
    }

    function resetGame() {
        arena.forEach(row => row.fill(0));
        score = 0;
        lines = 0;
        gameOver = false;
        document.getElementById('game-over').style.display = 'none';
        updateScore();
        playerReset();
        update();
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let score = 0;
    let lines = 0;
    let gameOver = false;

    function update(time = 0) {
        if (gameOver) return;

        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }

        draw();
        requestAnimationFrame(update);
    }

    const arena = createMatrix(12, 20);

    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
    };

    // Controls
    document.addEventListener('keydown', event => {
        if (gameOver) return;

        if (event.keyCode === 37 || event.keyCode === 65) { // Left or A
            playerMove(-1);
        } else if (event.keyCode === 39 || event.keyCode === 68) { // Right or D
            playerMove(1);
        } else if (event.keyCode === 40 || event.keyCode === 87) { // Down or W
            playerDrop();
        } else if (event.keyCode === 38 || event.keyCode === 81 || event.keyCode === 83) { // Up, Q, or S (Rotate)
            playerRotate(1);
        } else if (event.keyCode === 32) { // Space (Hard Drop)
            while(!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
    });

    playerReset();
    updateScore();
    update();
</script>
</body>
</html>
